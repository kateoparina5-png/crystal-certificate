<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ваш подарочный сертификат — CRYSTAL</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta property="og:type" content="website">
<meta property="og:site_name" content="CRYSTAL">
<meta property="og:title" content="🎁 Вам подарочный сертификат от CRYSTAL">
<meta property="og:description" content="Нажмите, чтобы открыть ваш подарочный сертификат от автомоечного комплекса CRYSTAL">
<meta property="og:image" content="https://kateoparina5-png.github.io/crystal-certificate/logo-og.jpg">
<meta property="og:url" content="https://kateoparina5-png.github.io/crystal-certificate/reveal.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="🎁 Вам подарочный сертификат от CRYSTAL">
<meta name="twitter:description" content="Нажмите, чтобы открыть ваш подарочный сертификат от автомоечного комплекса CRYSTAL">
<meta name="twitter:image" content="https://kateoparina5-png.github.io/crystal-certificate/logo-og.jpg">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;
  background:radial-gradient(ellipse at center,#16234f 0%,#060a1c 70%)
}
#loading{color:#93c5fd;font-size:15px;letter-spacing:.5px;text-align:center}
#errBox{display:none;color:#fca5a5;text-align:center;max-width:420px;font-size:14px;line-height:1.6}
#giftWrap{display:none;flex-direction:column;align-items:center;gap:24px;cursor:pointer;
  user-select:none;transition:opacity 1.1s ease, transform 1.1s ease}
.reveal-heading{color:#eaf2ff;font-size:clamp(20px,3.4vw,30px);font-weight:800;letter-spacing:.3px;text-align:center}
.gift-box-ring{position:relative;width:320px;height:320px;display:flex;align-items:center;justify-content:center}
.gift-box-ring::before,.gift-box-ring::after{content:"";position:absolute;inset:0;border-radius:50%;
  border:1.5px solid rgba(147,197,253,.4);animation:ringPulse 2.6s ease-out infinite}
.gift-box-ring::after{animation-delay:1.3s}
@keyframes ringPulse{0%{transform:scale(.7);opacity:.9}100%{transform:scale(1.55);opacity:0}}
.gift-logo{width:200px;max-width:70%;height:auto;position:relative;z-index:1;cursor:pointer;
  animation:logoBlink 1.8s ease-in-out infinite, floatBox 3.4s ease-in-out infinite}
@keyframes logoBlink{
  0%,100%{filter:drop-shadow(0 0 16px rgba(147,197,253,.5)) brightness(1)}
  50%{filter:drop-shadow(0 0 46px rgba(147,197,253,1)) brightness(1.3)}
}
@keyframes floatBox{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.gift-hint{color:#93c5fd;font-size:16px;letter-spacing:1.5px;text-transform:uppercase;opacity:.9;font-weight:700}
#giftWrap.opening{transform:scale(1.3) rotate(6deg);opacity:0}

/* ── МАСКОТ-МОЙЩИК ── */
#mascotWrap{display:none;flex-direction:column;align-items:center;gap:14px;cursor:pointer;
  user-select:none;opacity:0;transform:translateY(16px) scale(.92);
  transition:opacity .55s ease, transform .55s ease}
#mascotWrap.show{opacity:1;transform:translateY(0) scale(1)}
#mascotWrap.leaving{opacity:0;transform:translateY(-10px) scale(.9);transition:opacity .4s ease, transform .4s ease}
.speech-bubble{position:relative;background:#eaf2ff;color:#0f172a;font-weight:700;font-size:16px;
  line-height:1.4;text-align:center;border-radius:16px;padding:14px 20px;max-width:300px;min-height:24px;
  box-shadow:0 8px 24px rgba(0,0,0,.35)}
.speech-bubble::after{content:"";position:absolute;left:50%;bottom:-9px;transform:translateX(-50%);
  border-width:9px 9px 0 9px;border-style:solid;border-color:#eaf2ff transparent transparent transparent}
.speech-bubble span{opacity:0;transition:opacity .25s ease;display:inline-block}
.speech-bubble span.on{opacity:1}
.mascot-svg{width:190px;height:auto;animation:mascotFloat 2.6s ease-in-out infinite;
  filter:drop-shadow(0 10px 20px rgba(0,0,0,.35))}
@keyframes mascotFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.wave-arm{transform-box:fill-box;transform-origin:80% 70%;animation:waveArm 1.1s ease-in-out infinite}
@keyframes waveArm{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-16deg)}}
.mascot-hint{color:#93c5fd;font-size:13px;letter-spacing:.8px;text-transform:uppercase;opacity:.75;font-weight:700}
@media(max-width:480px){.mascot-svg{width:150px}.speech-bubble{font-size:14px;max-width:250px}}
#certStage{display:none;opacity:0;transform:translateY(20px) scale(.95);width:100%;max-width:860px;
  transition:opacity 1.3s ease, transform 1.3s ease}
#certStage.show{display:block;opacity:1;transform:translateY(0) scale(1)}
.spark{position:fixed;border-radius:50%;background:#93c5fd;pointer-events:none;z-index:99;
  animation:sparkOut 2.1s ease-out forwards}
@keyframes sparkOut{to{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
.wflash{position:fixed;pointer-events:none;z-index:96;border-radius:50%;
  background:radial-gradient(circle, rgba(255,255,255,.95) 0%, rgba(180,230,255,.45) 40%, transparent 72%);
  transform:translate(-50%,-50%) scale(.2);opacity:0;
  animation:wflashAnim .55s ease-out forwards}
@keyframes wflashAnim{0%{transform:translate(-50%,-50%) scale(.15);opacity:1}100%{transform:translate(-50%,-50%) scale(1.5);opacity:0}}
.wsplash{position:fixed;pointer-events:none;z-index:97;border-radius:50%;
  border:1.5px solid rgba(190,232,255,.7);
  background:radial-gradient(circle, rgba(190,232,255,.22) 0%, transparent 68%);
  transform:translate(-50%,-50%) scale(.15);opacity:0;
  animation:wsplashAnim 2.2s cubic-bezier(.15,.7,.25,1) forwards}
@keyframes wsplashAnim{
  0%{transform:translate(-50%,-50%) scale(.15);opacity:0}
  14%{opacity:.9}
  100%{transform:translate(-50%,-50%) scale(1);opacity:0}
}
.wdroplet{position:fixed;pointer-events:none;z-index:98;border-radius:60% 60% 62% 62% / 70% 70% 55% 55%;
  background:linear-gradient(150deg,#ffffff 0%,#cdeeff 35%,#6fc3f5 100%);
  box-shadow:0 0 5px rgba(140,210,255,.75), inset -1px -1px 2px rgba(255,255,255,.6);
  will-change:transform,opacity}
@media(max-width:480px){.gift-box-ring{width:240px;height:240px}.gift-logo{width:150px}}
</style>
</head>
<body>

<div id="loading">Загрузка сертификата…</div>
<div id="errBox">Не удалось загрузить сертификат.<br>Проверьте ссылку или откройте её ещё раз.</div>

<div id="giftWrap" onclick="openGift(this)">
  <div class="reveal-heading">Вам подарочный сертификат от CRYSTAL 🎉</div>
  <div class="gift-box-ring"><img class="gift-logo" id="giftLogo" src="" alt="CRYSTAL"></div>
  <div class="gift-hint">Нажмите на мигающий логотип — сертификат откроется</div>
</div>

<div id="mascotWrap" onclick="skipMascot()">
  <div class="speech-bubble"><span id="speechText"></span></div>
  <svg class="mascot-svg" viewBox="0 0 220 300" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="110" cy="285" rx="55" ry="10" fill="rgba(0,0,0,.25)"/>
    <path d="M65 175 Q40 200 45 240" stroke="#1e3a8a" stroke-width="18" stroke-linecap="round" fill="none"/>
    <circle cx="45" cy="242" r="12" fill="#ffd9a8"/>
    <path d="M60 260 Q55 160 110 155 Q165 160 160 260 Q160 275 110 278 Q60 275 60 260 Z" fill="url(#bodyGrad)"/>
    <path d="M85 160 L110 180 L135 160 L128 150 L110 162 L92 150 Z" fill="#eaf2ff"/>
    <rect x="92" y="200" width="36" height="15" rx="3" fill="#eaf2ff"/>
    <text x="110" y="211" font-size="9" font-weight="700" fill="#1e3a8a" text-anchor="middle" font-family="Arial, sans-serif">CRYSTAL</text>
    <g class="wave-arm">
      <path d="M150 175 Q185 165 175 120" stroke="#1e3a8a" stroke-width="18" stroke-linecap="round" fill="none"/>
      <circle cx="176" cy="115" r="13" fill="#ffd9a8"/>
      <rect x="185" y="90" width="26" height="20" rx="6" fill="#facc15" stroke="#eab308" stroke-width="2"/>
    </g>
    <path d="M110 40 C140 75 150 100 150 118 C150 143 132 160 110 160 C88 160 70 143 70 118 C70 100 80 75 110 40 Z" fill="url(#headGrad)" stroke="#eaf2ff" stroke-width="2"/>
    <path d="M78 92 Q110 68 142 92 L142 100 Q110 84 78 100 Z" fill="#1e3a8a"/>
    <circle cx="110" cy="86" r="5" fill="#93c5fd"/>
    <circle cx="97" cy="122" r="5" fill="#0f172a"/>
    <circle cx="123" cy="122" r="5" fill="#0f172a"/>
    <circle cx="98" cy="120" r="1.6" fill="#fff"/>
    <circle cx="124" cy="120" r="1.6" fill="#fff"/>
    <path d="M96 136 Q110 148 124 136" stroke="#0f172a" stroke-width="3" stroke-linecap="round" fill="none"/>
    <circle cx="85" cy="130" r="6" fill="#7dd3fc" opacity=".5"/>
    <circle cx="135" cy="130" r="6" fill="#7dd3fc" opacity=".5"/>
    <defs>
      <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#3b82f6"/>
        <stop offset="100%" stop-color="#1e3a8a"/>
      </linearGradient>
      <linearGradient id="headGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#eaf2ff"/>
        <stop offset="100%" stop-color="#93c5fd"/>
      </linearGradient>
    </defs>
  </svg>
  <div class="mascot-hint">Нажмите, чтобы продолжить</div>
</div>

<div class="cert-wrap" id="certStage"></div>

<script>
function qp(){
  // Данные читаем из query-строки (?amt=...), а не из #hash: некоторые встроенные
  // браузеры мессенджеров (например MAX) обрезают всё после "#" при открытии
  // ссылки из чата, из-за чего сертификат показывался пустым. На всякий случай
  // как запасной вариант всё ещё проверяем и #hash — вдруг ссылка старого формата.
  const p=new URLSearchParams(location.search);
  if(![...p.keys()].length && location.hash.length>1){
    const hp=new URLSearchParams(location.hash.slice(1));
    hp.forEach((v,k)=>p.set(k,v));
  }
  return {
    amt:p.get('amt')||'',
    name:p.get('name')||'',
    from:p.get('from')||'',
    exp:p.get('exp')||'',
    no:p.get('no')||'',
    msg:p.get('msg')||''
  };
}
function fmtDate(s){
  if(!s)return'—';
  const parts=s.split('-');
  if(parts.length!==3)return'—';
  const [y,m,d]=parts;
  const ms=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  return parseInt(d)+' '+ms[parseInt(m)-1]+' '+y+' г.';
}

async function init(){
  const data=qp();
  try{
    const res=await fetch('./index.html?nocache='+Date.now(),{cache:'no-store'});
    if(!res.ok)throw new Error('fetch failed');
    const text=await res.text();
    const doc=new DOMParser().parseFromString(text,'text/html');
    const styleEl=doc.querySelector('style');
    const certEl=doc.getElementById('cert');
    const logoEl=doc.querySelector('.logo-img');
    if(!styleEl||!certEl||!logoEl)throw new Error('parse failed');

    const s=document.createElement('style');
    s.textContent=styleEl.textContent;
    document.head.appendChild(s);

    document.getElementById('giftLogo').src=logoEl.getAttribute('src');

    const stage=document.getElementById('certStage');
    stage.innerHTML=certEl.outerHTML;

    const amt=data.amt;
    stage.querySelector('#cTitle').textContent = amt ? (Number(amt).toLocaleString('ru-RU')+' ₽') : 'Сумма не указана';
    stage.querySelector('#cSub').textContent = 'Сертификат на свободную сумму — можно потратить на любые услуги';

    const nameEl=stage.querySelector('#cName');
    nameEl.innerHTML = data.name ? ('<span style="color:#e2e8f0">'+data.name+'</span>') : '<span class="c-to-placeholder">Имя получателя</span>';

    stage.querySelector('#cFrom').textContent = data.from || '—';
    stage.querySelector('#fromRow').style.display = data.from ? 'flex' : 'none';

    stage.querySelector('#cExp').textContent = fmtDate(data.exp);
    stage.querySelector('#cNo').textContent = data.no || 'CRYS-0000';

    const msgEl=stage.querySelector('#cMsg');
    const msgRow=stage.querySelector('#msgRow');
    if(data.msg){ msgEl.textContent=data.msg; msgRow.style.display='flex'; }
    else{ msgRow.style.display='none'; }

    document.getElementById('loading').style.display='none';
    document.getElementById('giftWrap').style.display='flex';
  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('errBox').style.display='block';
  }
}
init();

function spark(x,y){
  for(let i=0;i<36;i++){
    const s=document.createElement('div');
    s.className='spark';
    const size=4+Math.random()*6;
    s.style.width=s.style.height=size+'px';
    s.style.left=x+'px';s.style.top=y+'px';
    const ang=Math.random()*Math.PI*2, dist=110+Math.random()*160;
    s.style.setProperty('--dx',Math.cos(ang)*dist+'px');
    s.style.setProperty('--dy',Math.sin(ang)*dist+'px');
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),2150);
  }
}
function spawnRipple(x,y){
  [0,320].forEach((delay,idx)=>{
    setTimeout(()=>{
      const ring=document.createElement('div');
      ring.className='wsplash';
      const rsize=(30+Math.random()*46)*(idx?1.7:1);
      ring.style.width=ring.style.height=rsize+'px';
      ring.style.left=x+'px';ring.style.top=y+'px';
      document.body.appendChild(ring);
      setTimeout(()=>ring.remove(),2250);
    },delay);
  });
}
function spawnFlash(x,y){
  const f=document.createElement('div');
  f.className='wflash';
  const fsize=18+Math.random()*16;
  f.style.width=f.style.height=fsize+'px';
  f.style.left=x+'px';f.style.top=y+'px';
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),550);
}
function spawnDroplets(x,y,n){
  for(let i=0;i<n;i++){
    const drop=document.createElement('div');
    drop.className='wdroplet';
    const size=5+Math.random()*9;
    drop.style.width=size+'px';
    drop.style.height=(size*1.15)+'px';
    drop.style.left=x+'px';
    drop.style.top=y+'px';
    document.body.appendChild(drop);

    const angle=Math.random()*Math.PI*2;
    const spread=26+Math.random()*70;
    const peakX=Math.cos(angle)*spread;
    const peakY=Math.sin(angle)*spread*0.5 - (24+Math.random()*30);
    const fallX=peakX*1.5;
    const fallY=peakY+70+Math.random()*70;
    const rot=(Math.random()*260-130);
    const dur=1300+Math.random()*800;

    const t1='translate(-50%,-50%) translate('+(peakX*0.55)+'px,'+peakY+'px) rotate('+(rot*0.5)+'deg) scale(1)';
    const t2='translate(-50%,-50%) translate('+fallX+'px,'+fallY+'px) rotate('+rot+'deg) scale(.35)';
    const anim=drop.animate([
      { transform:'translate(-50%,-50%) translate(0px,0px) rotate(0deg) scale(.3)', opacity:0 },
      { transform:t1, opacity:1, offset:0.32 },
      { transform:t2, opacity:0 }
    ], { duration:dur, easing:'cubic-bezier(.22,.6,.32,1)' });
    anim.onfinish=function(){ drop.remove(); };
  }
}
function waterSplash(){
  const w=window.innerWidth, h=window.innerHeight;
  const points=20;
  for(let i=0;i<points;i++){
    const delay=Math.random()*1500;
    setTimeout(()=>{
      const x=Math.random()*w, y=Math.random()*h;
      spawnFlash(x,y);
      spawnRipple(x,y);
      spawnDroplets(x,y,3+Math.floor(Math.random()*4));
    },delay);
  }
}
function openGift(el){
  el.classList.add('opening');
  setTimeout(()=>{
    el.style.display='none';
    showMascot();
  },500);
}

// ── МОЙЩИК CRYSTAL ПРИВЕТСТВУЕТ ПЕРЕД ПОКАЗОМ СЕРТИФИКАТА ──
var mascotTimer=null;
function showMascot(){
  const wrap=document.getElementById('mascotWrap');
  const lines=['Привет! 👋 Я мойщик CRYSTAL.','Тебе повезло — у меня для тебя подарок! 🎁'];
  const textEl=document.getElementById('speechText');
  wrap.style.display='flex';
  requestAnimationFrame(()=>wrap.classList.add('show'));

  let i=0;
  function showLine(){
    textEl.classList.remove('on');
    setTimeout(()=>{ textEl.textContent=lines[i]; textEl.classList.add('on'); },200);
  }
  showLine();
  mascotTimer=setInterval(()=>{
    i++;
    if(i>=lines.length){
      clearInterval(mascotTimer);
      mascotTimer=setTimeout(revealCert,1500);
      return;
    }
    showLine();
  },1900);
}
function skipMascot(){
  clearInterval(mascotTimer);
  clearTimeout(mascotTimer);
  revealCert();
}
function revealCert(){
  const wrap=document.getElementById('mascotWrap');
  if(wrap.classList.contains('leaving'))return; // уже переходим — не запускать дважды
  wrap.onclick=null;
  wrap.classList.add('leaving');
  const cx=window.innerWidth/2, cy=window.innerHeight/2;
  spark(cx,cy);
  waterSplash();
  setTimeout(()=>{
    wrap.style.display='none';
    document.getElementById('certStage').classList.add('show');
    document.getElementById('certStage').scrollIntoView({behavior:'smooth',block:'center'});
  },500);
}
</script>
</body>
</html>
